{% load static %}

  </div>
  <nav class="nav-menu">
    <a href="{% url 'admin_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}"><i class="fa-solid fa-chart-line"></i> Dashboard</a>

   class="nav-link {% if request.resolver_match.url_name == 'store_settings' %}active{% endif %}">

    Store Settings
</a>
    <a href="{% url 'analytics' %}" class="nav-link {% if request.resolver_match.url_name == 'analytics' %}active{% endif %}"><i class="fa-solid fa-chart-bar"></i> Analytics</a>
