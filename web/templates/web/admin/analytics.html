{% load static %}
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Analytics | Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/admin.css' %}"></head><body>
<div class="admin-layout"><div class="sidebar-overlay" id="sidebarOverlay"></div>{% include "web/admin/_sidebar.html" %}
<main class="main-content">
<header class="top-header"><div class="header-left"><button class="mobile-toggle" id="openSidebar"><i class="fa-solid fa-bars-staggered"></i></button><div><h1 class="page-title">Analytics</h1></div></div></header>
<section class="metrics-grid">
<div class="metric-card"><div class="metric-header"><div class="metric-icon"><i class="fa-solid fa-users"></i></div>Users</div><div class="metric-value">{{ total_users }}</div></div>
<div class="metric-card"><div class="metric-header"><div class="metric-icon"><i class="fa-solid fa-seedling"></i></div>Products</div><div class="metric-value">{{ total_products }}</div></div>
<div class="metric-card"><div class="metric-header"><div class="metric-icon"><i class="fa-solid fa-box"></i></div>Orders</div><div class="metric-value">{{ total_orders }}</div></div>
<div class="metric-card"><div class="metric-header"><div class="metric-icon"><i class="fa-solid fa-indian-rupee-sign"></i></div>Revenue</div><div class="metric-value">₹{{ total_revenue|floatformat:0 }}</div></div>
</section>
<div class="data-card" style="padding:28px;"><div style="font-size:1rem;font-weight:700;margin-bottom:20px;">Monthly Revenue (Delivered Orders)</div><canvas id="chart" style="max-height:320px;"></canvas></div>
</main></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'js/admin.js' %}"></script>
<script>
new Chart(document.getElementById('chart'),{type:'bar',data:{labels:{{ chart_labels|safe }},datasets:[{label:'Revenue (₹)',data:{{ chart_revenue|safe }},backgroundColor:'rgba(31,81,50,.14)',borderColor:'#1F5132',borderWidth:2,borderRadius:8,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,.04)'},ticks:{callback:v=>'₹'+v}},x:{grid:{display:false}}}}});
</script></body></html>
